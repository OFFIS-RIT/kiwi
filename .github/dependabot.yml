version: 2

updates:
    # Bun workspace root and package manifests
    - package-ecosystem: "bun"
      directories:
          - "/"
          - "/apps/api"
          - "/apps/frontend"
          - "/apps/worker"
          - "/packages/ai"
          - "/packages/auth"
          - "/packages/db"
          - "/packages/files"
          - "/packages/graph"
          - "/packages/logger"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "06:00"
          timezone: "Europe/Berlin"
      labels:
          - "dependencies"
          - "bun"
      groups:
          minor-and-patch:
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"
      open-pull-requests-limit: 10

    # Docker base images
    - package-ecosystem: "docker"
      directories:
          - "/apps/api"
          - "/apps/frontend"
          - "/apps/worker"
          - "/migrations"
          - "/postgres"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "06:00"
          timezone: "Europe/Berlin"
      labels:
          - "dependencies"
          - "docker"
      groups:
          docker:
              patterns:
                  - "*"

    # Docker Compose services
    - package-ecosystem: "docker-compose"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "06:00"
          timezone: "Europe/Berlin"
      labels:
          - "dependencies"
          - "docker"
      groups:
          compose:
              patterns:
                  - "*"

    # GitHub Actions
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "06:00"
          timezone: "Europe/Berlin"
      labels:
          - "dependencies"
          - "ci"
      groups:
          actions:
              patterns:
                  - "*"
