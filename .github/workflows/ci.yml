name: CI

on:
    pull_request:
        branches:
            - dev
            - main
        paths:
            - "apps/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "turbo.json"
            - ".env.sample"
            - "drizzle.config.ts"
    push:
        branches:
            - dev
        paths:
            - "apps/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "turbo.json"
            - ".env.sample"
            - "drizzle.config.ts"

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Cache Turbo artifacts
              uses: actions/cache@v5
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Prepare environment
              run: cp .env.sample .env

            - name: Run tests
              run: bun run test

    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Cache Turbo artifacts
              uses: actions/cache@v5
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Prepare environment
              run: cp .env.sample .env

            - name: Build
              run: bun run build
