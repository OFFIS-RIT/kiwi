name: Auth CI

on:
    pull_request:
        branches:
            - dev
            - main
        paths:
            - "auth/**"
    push:
        branches:
            - dev
        paths:
            - "auth/**"

jobs:
    test:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: auth

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('auth/bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run tests
              run: bun test
