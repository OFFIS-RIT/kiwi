services:
    caddy:
        container_name: caddy
        image: caddy:2-alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        environment:
            APP_DOMAIN: ${APP_DOMAIN:-localhost}
            TLS_EMAIL: ${TLS_EMAIL:-}
        volumes:
            - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            frontend:
                condition: service_started
            server:
                condition: service_healthy

    frontend:
        container_name: frontend
        image: ghcr.io/offis-rit/kiwi/frontend:latest
        restart: unless-stopped

    server:
        container_name: server
        image: ghcr.io/offis-rit/kiwi/server:latest
        restart: unless-stopped
        environment:
            NODE_ENV: production
            LOG_LEVEL: ${LOG_LEVEL:-info}
            DATABASE_URL: ${DATABASE_URL:-postgresql://kiwi:kiwi@bouncer:5432/kiwi?sslmode=disable}
            DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL:-postgresql://kiwi:kiwi@postgres:5432/kiwi?sslmode=disable}
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
            S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
            S3_REGION: ${S3_REGION}
            S3_BUCKET: ${S3_BUCKET}
            AI_TEXT_ADAPTER: ${AI_TEXT_ADAPTER}
            AI_TEXT_MODEL: ${AI_TEXT_MODEL}
            AI_TEXT_KEY: ${AI_TEXT_KEY}
            AI_TEXT_URL: ${AI_TEXT_URL:-}
            AI_TEXT_RESOURCE_NAME: ${AI_TEXT_RESOURCE_NAME:-}
            AI_EMBEDDING_ADAPTER: ${AI_EMBEDDING_ADAPTER}
            AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL}
            AI_EMBEDDING_KEY: ${AI_EMBEDDING_KEY}
            AI_EMBEDDING_URL: ${AI_EMBEDDING_URL:-}
            AI_EMBEDDING_RESOURCE_NAME: ${AI_EMBEDDING_RESOURCE_NAME:-}
            AI_IMAGE_ADAPTER: ${AI_IMAGE_ADAPTER:-}
            AI_IMAGE_MODEL: ${AI_IMAGE_MODEL:-}
            AI_IMAGE_KEY: ${AI_IMAGE_KEY:-}
            AI_IMAGE_URL: ${AI_IMAGE_URL:-}
            AI_IMAGE_RESOURCE_NAME: ${AI_IMAGE_RESOURCE_NAME:-}
            AI_AUDIO_ADAPTER: ${AI_AUDIO_ADAPTER:-}
            AI_AUDIO_MODEL: ${AI_AUDIO_MODEL:-}
            AI_AUDIO_KEY: ${AI_AUDIO_KEY:-}
            AI_AUDIO_URL: ${AI_AUDIO_URL:-}
            AI_AUDIO_RESOURCE_NAME: ${AI_AUDIO_RESOURCE_NAME:-}
            AUTH_SECRET: ${AUTH_SECRET}
            AUTH_URL: ${AUTH_URL}
            TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
            AUTH_CROSS_SUBDOMAIN_COOKIES: ${AUTH_CROSS_SUBDOMAIN_COOKIES:-}
            AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
            LDAP_URL: ${LDAP_URL:-}
            LDAP_BIND_DN: ${LDAP_BIND_DN:-}
            LDAP_PASSW: ${LDAP_PASSW:-}
            LDAP_BASE_DN: ${LDAP_BASE_DN:-}
            LDAP_SEARCH_ATTR: ${LDAP_SEARCH_ATTR:-}
            APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
            APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
            APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
            GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
            MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
            MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
            MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
            MICROSOFT_AUTHORITY_URL: ${MICROSOFT_AUTHORITY_URL:-}
            OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
            OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-}
            OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
        healthcheck:
            test: ["CMD", "/busybox", "wget", "-qO-", "http://localhost:4321/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        depends_on:
            bouncer:
                condition: service_healthy
            migrations:
                condition: service_completed_successfully
            rustfs:
                condition: service_healthy

    worker:
        container_name: worker
        image: ghcr.io/offis-rit/kiwi/worker:latest
        restart: unless-stopped
        environment:
            NODE_ENV: production
            DATABASE_URL: ${DATABASE_URL:-postgresql://kiwi:kiwi@bouncer:5432/kiwi?sslmode=disable}
            DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL:-postgresql://kiwi:kiwi@postgres:5432/kiwi?sslmode=disable}
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
            S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
            S3_REGION: ${S3_REGION}
            S3_BUCKET: ${S3_BUCKET}
            WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
            AI_TEXT_ADAPTER: ${AI_TEXT_ADAPTER}
            AI_TEXT_MODEL: ${AI_TEXT_MODEL}
            AI_TEXT_KEY: ${AI_TEXT_KEY}
            AI_TEXT_URL: ${AI_TEXT_URL:-}
            AI_TEXT_RESOURCE_NAME: ${AI_TEXT_RESOURCE_NAME:-}
            AI_EMBEDDING_ADAPTER: ${AI_EMBEDDING_ADAPTER}
            AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL}
            AI_EMBEDDING_KEY: ${AI_EMBEDDING_KEY}
            AI_EMBEDDING_URL: ${AI_EMBEDDING_URL:-}
            AI_EMBEDDING_RESOURCE_NAME: ${AI_EMBEDDING_RESOURCE_NAME:-}
            AI_IMAGE_ADAPTER: ${AI_IMAGE_ADAPTER:-}
            AI_IMAGE_MODEL: ${AI_IMAGE_MODEL:-}
            AI_IMAGE_KEY: ${AI_IMAGE_KEY:-}
            AI_IMAGE_URL: ${AI_IMAGE_URL:-}
            AI_IMAGE_RESOURCE_NAME: ${AI_IMAGE_RESOURCE_NAME:-}
            AI_AUDIO_ADAPTER: ${AI_AUDIO_ADAPTER:-}
            AI_AUDIO_MODEL: ${AI_AUDIO_MODEL:-}
            AI_AUDIO_KEY: ${AI_AUDIO_KEY:-}
            AI_AUDIO_URL: ${AI_AUDIO_URL:-}
            AI_AUDIO_RESOURCE_NAME: ${AI_AUDIO_RESOURCE_NAME:-}
        depends_on:
            bouncer:
                condition: service_healthy
            migrations:
                condition: service_completed_successfully
            rustfs:
                condition: service_healthy

    postgres:
        container_name: postgres
        image: ghcr.io/offis-rit/kiwi/postgres:latest
        restart: unless-stopped
        environment:
            POSTGRES_USER: kiwi
            POSTGRES_PASSWORD: kiwi
            POSTGRES_DB: kiwi
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kiwi -d kiwi"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s

    migrations:
        container_name: migrations
        image: ghcr.io/offis-rit/kiwi/migrations:latest
        restart: "no"
        environment:
            DATABASE_URL: "postgresql://kiwi:kiwi@postgres:5432/kiwi?sslmode=disable"
        depends_on:
            postgres:
                condition: service_healthy

    bouncer:
        container_name: bouncer
        image: edoburu/pgbouncer:latest
        restart: unless-stopped
        environment:
            DB_USER: kiwi
            DB_PASSWORD: kiwi
            DB_NAME: kiwi
            DB_HOST: postgres
            AUTH_TYPE: scram-sha-256
            POOL_MODE: transaction
            MAX_CLIENT_CONN: 1200
            DEFAULT_POOL_SIZE: 20
            ADMIN_USERS: kiwi
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "pg_isready", "-h", "localhost", "-U", "kiwi", "-d", "kiwi"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s

    rustfs:
        container_name: rustfs
        image: rustfs/rustfs:latest
        restart: unless-stopped
        volumes:
            - rustfs_data:/data
        environment:
            RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
            RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
            RUSTFS_ADDRESS: "0.0.0.0:9000"
            RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
            RUSTFS_CONSOLE_ENABLE: "true"
        command: /data
        healthcheck:
            test: ["CMD", "sh", "-c", "curl -f http://localhost:9000/health"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 40s

    rustfs-setup:
        container_name: rustfs-setup
        image: amazon/aws-cli:latest
        depends_on:
            rustfs:
                condition: service_healthy
        environment:
            AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
            AWS_DEFAULT_REGION: ${S3_REGION}
            S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
            S3_BUCKET: ${S3_BUCKET}
        entrypoint: >
            sh -c "
            set -e;
            if aws --endpoint-url $${S3_ENDPOINT} s3 ls s3://$${S3_BUCKET} >/dev/null 2>&1; then
                echo 'Bucket already exists, skipping init...';
            else
                echo 'Setting up bucket';
                aws --endpoint-url $${S3_ENDPOINT} s3 mb s3://$${S3_BUCKET};
                echo 'Setup completed';
            fi
            "

volumes:
    caddy_config:
    caddy_data:
    postgres_data:
    rustfs_data:

networks:
    default:
        driver: bridge
        name: kiwi_internal
